name: Demo API Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  demo-api-tests:
    name: Run demo API tests
    runs-on: ubuntu-latest

    env:
      DEMO_APP_DB_PATH: demo.db
      DEMO_TEST_USER_EMAIL: test@example.com
      DEMO_TEST_USER_PASSWORD: Password123!
      DISABLED_TEST_USER_ID: user-disabled-1
      API_BASE_URL: http://127.0.0.1:3000
      TEST_USER_EMAIL: test@example.com
      TEST_USER_PASSWORD: Password123!
      API_RESPONSE_TIME_LIMIT_MS: "1000"
      SQLITE_DB_PATH: demo-app/demo.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install demo app dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r demo-app/requirements.txt

      - name: Install Python API test dependencies
        run: |
          python -m pip install -r 06-tests/api/requirements.txt

      - name: Install AJV API test dependencies
        working-directory: 06-tests/api-ajv
        run: |
          npm install

      - name: Seed demo database
        working-directory: demo-app
        run: |
          python -m app.seed

      - name: Start demo app
        working-directory: demo-app
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 3000 > ../demo-app.stdout.log 2> ../demo-app.stderr.log &

      - name: Wait for demo app
        run: |
          python - <<'PY'
          import json
          import time
          import urllib.request

          url = "http://127.0.0.1:3000/health"

          for attempt in range(30):
              try:
                  with urllib.request.urlopen(url, timeout=2) as response:
                      data = json.loads(response.read().decode("utf-8"))
                      if data.get("success") is True:
                          print("Demo app is ready.")
                          raise SystemExit(0)
              except Exception as exc:
                  print(f"Waiting for demo app... attempt={attempt + 1} error={exc}")
                  time.sleep(1)

          print("Demo app did not become ready in time.")
          raise SystemExit(1)
          PY

      - name: Run Python API tests
        working-directory: 06-tests/api
        run: |
          python -m pytest --junitxml=../../test-results/python-api-results.xml

      - name: Run AJV API contract tests
        working-directory: 06-tests/api-ajv
        run: |
          npm test

      - name: Run DB validation
        run: |
          python 06-tests/db-validation/validate_login_state.py

      - name: Collect demo app logs
        if: always()
        run: |
          mkdir -p test-results/demo-app
          cp demo-app.stdout.log test-results/demo-app/demo-app.stdout.log || true
          cp demo-app.stderr.log test-results/demo-app/demo-app.stderr.log || true

      - name: Upload demo API test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-api-test-artifacts
          path: |
            test-results/
            demo-app.stdout.log
            demo-app.stderr.log
