name: Example - Performance Tests

on:
  workflow_dispatch:

jobs:
  performance-tests-example:
    name: Example performance test execution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 performance test
        env:
          PERF_BASE_URL: ${{ secrets.PERF_BASE_URL }}
        run: k6 run 06-tests/performance/k6/example-load-test.js

      - name: Upload performance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-report
          path: reports/performance/
          retention-days: 7

# Notes:
# This is an example workflow only.
# Do not run load tests against production without explicit human approval.
# Load profile, thresholds, and environment capacity must be confirmed before execution.
