name: Validate AI QA Command Center Repository

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate repository structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Validate agent registry
        run: |
          python 10-scripts/validation/check-agent-registry.py

      - name: Validate required file coverage
        run: |
          python 10-scripts/validation/check-agent-prompt-coverage.py
