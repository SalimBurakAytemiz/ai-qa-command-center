    number: 1
    team: test-planning
    title: Test Planning Agent
    purpose: Defines the test scope, platform coverage, quality priorities and high-level test strategy for a product, module or feature.
    phase: 1
    active: true
    model_profile: medium
    token_budget: medium
    tools:
      - product_context_reader
      - test_scope_builder
      - risk_matrix_builder
      - task_plan_writer
    inputs:
      - product_context
      - business_goals
      - user_roles
      - modules
      - acceptance_criteria
      - platform_list
    outputs:
      - test_scope
      - test_strategy
      - platform_coverage_plan
      - initial_risk_matrix
      - team_task_plan
    reviewer: output-reviewer-agent

  - id: happy-path-test-case-agent
