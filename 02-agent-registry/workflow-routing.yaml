      - api-test-agent
      - db-validation-agent
      - web-automation-agent
      - output-reviewer-agent
      - defect-triage-agent

  mobile_feature:
    description: Workflow for iOS, Android, mobile responsive or notification-related changes.
    agents:
      - product-intake-agent
      - test-strategy-agent
      - task-router-agent
      - token-controller-agent
      - ios-mobile-app-test-agent
      - android-mobile-app-test-agent
