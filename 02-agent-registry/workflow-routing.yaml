routes:
  new_product_or_feature:
    description: Main workflow for a new product, module or feature request.
    agents:
      - product-intake-agent
      - test-strategy-agent
      - task-router-agent
      - token-controller-agent
      - test-planning-agent
      - happy-path-test-case-agent
      - edge-negative-case-agent
      - feature-validation-agent
      - output-reviewer-agent
      - jira-trello-agent
      - daily-quality-report-agent

  web_feature:
    description: Workflow for web site, responsive web or admin panel changes.
    agents:
      - product-intake-agent
      - test-strategy-agent
      - task-router-agent
      - token-controller-agent
      - web-functional-test-agent
      - web-design-pixel-perfect-agent
