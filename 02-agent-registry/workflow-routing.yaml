      - mobile-automation-agent
      - output-reviewer-agent
      - defect-triage-agent

  backend_feature:
    description: Workflow for backend, API, database, socket or service integration changes.
    agents:
      - product-intake-agent
      - test-strategy-agent
      - task-router-agent
      - token-controller-agent
      - api-test-agent
