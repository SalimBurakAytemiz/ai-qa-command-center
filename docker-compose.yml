services:
  demo-app:
    build:
      context: ./demo-app
      dockerfile: Dockerfile
    container_name: ai-qa-command-center-demo-app
    ports:
      - "3000:3000"
    environment:
      DEMO_APP_DB_PATH: /app/data/demo.db
      DEMO_TEST_USER_EMAIL: test@example.com
      DEMO_TEST_USER_PASSWORD: Password123!
      DISABLED_TEST_USER_ID: user-disabled-1
    volumes:
      - demo_app_data:/app/data
    command: >
      sh -c "python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 3000"

volumes:
  demo_app_data:
